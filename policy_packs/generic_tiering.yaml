# The org's permanent risk framework (owner decision 2026-07-07) — no longer
# a placeholder. Changes to tiers/gates happen here via PR (§20.3): GitHub is
# the source of truth for governance rules, the mlops.policy_packs table is
# the synced, queryable index (PolicyPackService.sync_packs). Additional packs
# (e.g. a future regulatory overlay) can be added as sibling YAML files.
policy_pack_id: generic_tiering_v1
name: Generic three-tier risk mechanism
tiers:
  tier_1:
    required_approval_gates: [code_review, business_approval]
    revalidation_frequency_days: null
    on_revalidation_due: warn
    allows_override: true
  tier_2:
    required_approval_gates: [code_review, legal_review, business_approval]
    revalidation_frequency_days: 365
    on_revalidation_due: warn
    allows_override: true
  tier_3:
    required_approval_gates: [code_review, legal_review, business_approval, security_review]
    revalidation_frequency_days: 180
    on_revalidation_due: block_new_traffic
    allows_override: false
